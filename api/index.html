<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box { padding: 20px; max-width: 400px; width: 90%; }
        h2 { margin-bottom: 10px; }
        p { color: #777; font-size: 14px; margin-bottom: 25px; }
        .btn {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; padding: 12px 24px; font-size: 16px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="title">Anti-Cheat Verification</h2>
    <p id="desc">Click the button below to link your device fingerprint and secure your referral rewards.</p>
    <button id="btn" class="btn" onclick="verifyDevice()">Verify My Device</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
    }

    async function verifyDevice() {
        const btn = document.getElementById('btn');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        btn.disabled = true;
        title.innerText = "Checking Device...";
        desc.innerText = "Analyzing deep hardware features to prevent fake referrals...";

        try {
            // Load Fingerprint JS
            await loadScript('https://openfpcdn.io/fingerprintjs/v4');
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            const deviceFingerprint = result.visitorId;

            // Extract User Info from Telegram WebApp Context
            const user = tg.initDataUnsafe?.user;
            if (!user) {
                alert("Please open this page inside your Telegram Bot!");
                return;
            }

            title.innerText = "Syncing Data...";

            // REPLACE THIS URL with your API/Webhook endpoint or database function
            // This API will process if the 'deviceFingerprint' is already linked to another user_id
            const backendResponse = await fetch('https://api.jobians.top/telegram/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    telegram_id: user.id,
                    username: user.username || 'N/A',
                    device_id: deviceFingerprint
                })
            });

            const resData = await backendResponse.json();

            if (resData.success) {
                title.innerText = "✅ Verified!";
                desc.innerText = "Your device is authentic. You can now close this window.";
                
                // Tell TBC Bot via standard web app data passing that it's success
                tg.sendData(JSON.stringify({ status: "VERIFIED", device: deviceFingerprint }));
                setTimeout(() => tg.close(), 1500);
            } else {
                title.innerText = "❌ Fraud Detected";
                desc.innerText = "This device has already been registered with a different account.";
                btn.style.backgroundColor = "#d9534f";
            }

        } catch (err) {
            title.innerText = "Error";
            desc.innerText = "Something went wrong. Make sure you have a working network connection.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
