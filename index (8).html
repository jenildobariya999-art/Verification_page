<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --a:#7c6eff;
      --g:#0dffaa;
      --r:#ff4f6d;
      --bg:#060810;
      --c1:#0b0e1c;
      --c2:#111525;
    }
    html,body{
      min-height:100vh;background:var(--bg);
      font-family:'Outfit',sans-serif;color:#fff;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;overflow:hidden;
    }
    canvas#cvs{position:fixed;inset:0;z-index:0;pointer-events:none}

    .page{
      position:relative;z-index:1;
      width:100%;max-width:340px;
      padding:20px 16px;
      display:flex;flex-direction:column;align-items:center;gap:12px;
    }

    /* ── USER CARD ── */
    .ucard{
      width:100%;
      background:var(--c1);
      border:1px solid rgba(124,110,255,0.16);
      border-radius:18px;
      padding:14px 16px;
      display:flex;align-items:center;gap:12px;
      position:relative;overflow:hidden;
    }
    .ucard::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(124,110,255,0.4),transparent);
    }

    /* avatar ring */
    .av-wrap{
      position:relative;flex-shrink:0;
      width:46px;height:46px;
    }
    .av-ring{
      position:absolute;inset:-3px;border-radius:50%;
      border:2px solid transparent;
      border-top-color:var(--a);
      border-right-color:rgba(124,110,255,0.3);
      animation:spin 2.5s linear infinite;
    }
    .av-ring.ok{border-top-color:var(--g);border-right-color:rgba(13,255,170,0.3)}
    .av-ring.fail{border-top-color:var(--r);border-right-color:rgba(255,79,109,0.3)}
    .av{
      width:46px;height:46px;border-radius:50%;
      background:linear-gradient(135deg,#3d2fff,#9d5cff);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:700;color:#fff;
      overflow:hidden;border:2px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}

    /* premium star */
    .prem{
      position:absolute;bottom:-2px;right:-2px;
      width:18px;height:18px;border-radius:50%;
      background:linear-gradient(135deg,#f59e0b,#fde68a);
      display:flex;align-items:center;justify-content:center;
      font-size:10px;border:2px solid var(--bg);
      z-index:2;box-shadow:0 0 8px rgba(245,158,11,0.6);
    }

    .uinfo{flex:1;min-width:0;text-align:left}
    .uname{
      font-size:14px;font-weight:600;color:#eeeaff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:160px;
    }
    .uid{font-size:10.5px;color:rgba(140,148,190,0.5);font-weight:400;margin-top:1px}

    /* status pill */
    .spill{
      flex-shrink:0;
      display:flex;align-items:center;gap:5px;
      padding:5px 11px;border-radius:99px;
      font-size:9.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
      background:rgba(124,110,255,0.1);
      border:1px solid rgba(124,110,255,0.22);
      color:rgba(180,170,255,0.9);
      transition:all 0.4s;
    }
    .spill.ok{background:rgba(13,255,170,0.08);border-color:rgba(13,255,170,0.25);color:rgba(80,255,180,0.9)}
    .spill.fail{background:rgba(255,79,109,0.08);border-color:rgba(255,79,109,0.25);color:rgba(255,130,148,0.9)}
    .sdot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.6s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

    /* ── MAIN CARD ── */
    .mcard{
      width:100%;
      background:var(--c1);
      border:1px solid rgba(124,110,255,0.14);
      border-radius:22px;
      padding:36px 22px 28px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .mcard::before{
      content:'';position:absolute;top:0;left:25%;right:25%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(124,110,255,0.45),transparent);
    }



    /* hex dot texture */
    .mcard::after{
      content:'';position:absolute;inset:0;pointer-events:none;
      background-image:radial-gradient(rgba(124,110,255,0.035) 1px,transparent 1px);
      background-size:20px 20px;
    }

    /* icon system */
    .icon-zone{
      width:130px;height:130px;
      margin:0 auto 26px;
      position:relative;
      display:flex;align-items:center;justify-content:center;
    }

    /* outer dashed orbit */
    .orbit{
      position:absolute;inset:0;border-radius:50%;
      border:1px dashed rgba(124,110,255,0.15);
      animation:spin 12s linear infinite;
    }
    .orbit-dot{
      position:absolute;top:4px;left:50%;transform:translateX(-50%);
      width:5px;height:5px;border-radius:50%;
      background:var(--a);
      box-shadow:0 0 6px var(--a);
    }

    /* spinning arc */
    .arc{
      position:absolute;inset:8px;border-radius:50%;
      border:2px solid transparent;
      border-top-color:var(--a);
      border-left-color:rgba(124,110,255,0.2);
      animation:spin 1.3s linear infinite;
      opacity:0;transition:opacity 0.4s;
    }
    .arc.on{opacity:1}

    /* static ring */
    .sring{
      position:absolute;inset:18px;border-radius:50%;
      border:1px solid rgba(124,110,255,0.12);
      transition:border-color 0.5s;
    }

    /* disc */
    .disc{
      width:82px;height:82px;border-radius:50%;
      background:rgba(124,110,255,0.06);
      border:1px solid rgba(124,110,255,0.15);
      display:flex;align-items:center;justify-content:center;
      transition:all 0.5s;z-index:1;position:relative;
    }
    .disc svg{width:38px;height:38px}

    /* scan line sweep */
    .scanline{
      position:absolute;inset:0;border-radius:50%;overflow:hidden;
      pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:2;
    }
    .scanline.on{opacity:1}
    .scanline::after{
      content:'';position:absolute;
      width:100%;height:2px;
      background:linear-gradient(90deg,transparent,rgba(124,110,255,0.5),transparent);
      animation:sweep 1.5s ease-in-out infinite;
    }
    @keyframes sweep{
      0%{top:0%}100%{top:100%}
    }

    /* card border state */
    .mcard{border:1px solid rgba(124,110,255,0.14);transition:border-color 0.5s}
    .s-ok{border-color:rgba(13,255,170,0.2)!important}
    .s-err{border-color:rgba(255,79,109,0.2)!important}

    /* state colours */
    .s-ok .arc{border-top-color:var(--g);border-left-color:rgba(13,255,170,0.18)}
    .s-ok .sring{border-color:rgba(13,255,170,0.2)}
    .s-ok .disc{background:rgba(13,255,170,0.06);border-color:rgba(13,255,170,0.18)}
    .s-ok .orbit{border-color:rgba(13,255,170,0.12)}
    .s-ok .orbit-dot{background:var(--g);box-shadow:0 0 6px var(--g)}

    .s-err .arc{border-top-color:var(--r);border-left-color:rgba(255,79,109,0.18)}
    .s-err .sring{border-color:rgba(255,79,109,0.2)}
    .s-err .disc{background:rgba(255,79,109,0.06);border-color:rgba(255,79,109,0.18)}
    .s-err .orbit{border-color:rgba(255,79,109,0.12)}
    .s-err .orbit-dot{background:var(--r);box-shadow:0 0 6px var(--r)}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes popin{
      0%{transform:scale(0.3);opacity:0}
      60%{transform:scale(1.2)}
      100%{transform:scale(1);opacity:1}
    }
    .popin{animation:popin 0.45s cubic-bezier(.34,1.56,.64,1) both}

    /* ── text ── */
    .ttl{
      font-size:21px;font-weight:700;letter-spacing:-0.4px;
      margin-bottom:7px;transition:color 0.4s;
    }
    .ca{color:var(--a)} .cg{color:var(--g)} .cr{color:var(--r)}

    .sub{
      font-size:13px;font-weight:300;
      color:rgba(160,170,210,0.55);
      line-height:1.65;margin-bottom:22px;min-height:42px;
    }

    /* ── steps indicator ── */
    .steps{
      display:flex;align-items:center;justify-content:center;
      gap:6px;margin-bottom:20px;
    }
    .step{
      display:flex;align-items:center;gap:6px;
      font-size:9.5px;font-weight:600;letter-spacing:.5px;
      color:rgba(124,110,255,0.25);text-transform:uppercase;
    }
    .step.active{color:rgba(124,110,255,0.9)}
    .step.done{color:rgba(13,255,170,0.85)}
    .step.err{color:rgba(255,79,109,0.85)}
    .step.err .step-num{border-color:rgba(255,79,109,0.85);background:rgba(255,79,109,0.1)}
    .step-num{
      width:16px;height:16px;border-radius:50%;
      border:1px solid currentColor;
      display:flex;align-items:center;justify-content:center;
      font-size:8px;font-weight:700;
    }
    .step-line{width:24px;height:1px;background:rgba(124,110,255,0.12);border-radius:1px;transition:background 0.4s}


    /* ── progress ── */
    .prog{display:none;margin-bottom:20px}
    .prog.on{display:block}
    .prow{
      display:flex;justify-content:space-between;
      font-size:9.5px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;
      color:rgba(124,110,255,0.65);margin-bottom:7px;
    }
    .ptrack{height:3px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden}
    .pbar{height:100%;width:0%;border-radius:99px;background:var(--a);transition:width 0.2s,background 0.4s}

    /* ── button ── */
    .btn{
      width:100%;padding:15px;border:none;border-radius:13px;
      font-family:'Outfit',sans-serif;
      font-size:13.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
      cursor:pointer;position:relative;overflow:hidden;
      transition:transform 0.15s,opacity 0.15s;
    }
    .btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,0.09),transparent);
      pointer-events:none;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:scale(0.97)}
    .btn:disabled{opacity:0.25;cursor:not-allowed;transform:none!important}
    .ba{background:var(--a);color:#fff;}
    .bg{background:var(--g);color:#031a0e;}
    .br{background:var(--r);color:#fff;}

    /* credit */
    .credit{font-size:10.5px;color:rgba(255,255,255,0.14);font-weight:400}
    .credit b{color:rgba(124,110,255,0.45);font-weight:600}
  </style>
</head>
<body>
<canvas id="cvs"></canvas>

<div class="page">

  <!-- user card -->
  <div class="ucard" id="ucard" style="display:none">
    <div class="av-wrap">
      <div class="av-ring" id="avRing"></div>
      <div class="av" id="av">?</div>
      <div class="prem" id="premBadge" style="display:none">★</div>
    </div>
    <div class="uinfo">
      <div class="uname" id="uname">—</div>
      <div class="uid" id="uid">ID: —</div>
    </div>
    <div class="spill" id="spill">
      <span class="sdot"></span>Scanning
    </div>
  </div>

  <!-- main card -->
  <div class="mcard" id="mcard">
    <div class="icon-zone">
      <div class="orbit"><div class="orbit-dot"></div></div>
      <div class="arc on" id="arc"></div>
      <div class="sring"></div>
      <div class="scanline on" id="scanline"></div>
      <div class="disc" id="disc">
        <svg viewBox="0 0 38 38" fill="none" stroke="#7c6eff" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 4C10.72 4 4 10.72 4 19"/>
          <path d="M19 4C27.28 4 34 10.72 34 19"/>
          <path d="M19 8.8C13.32 8.8 8.8 13.32 8.8 19c0 5.5.8 9.4 2.2 12.2"/>
          <path d="M19 8.8C24.68 8.8 29.2 13.32 29.2 19c0 5.5-.8 9.4-2.2 12.2"/>
          <path d="M19 13.5C16.01 13.5 13.5 16.01 13.5 19c0 4 .52 6.8 1.45 9.2"/>
          <path d="M19 13.5C21.99 13.5 24.5 16.01 24.5 19c0 4-.52 6.8-1.45 9.2"/>
          <path d="M19 18.2C18.22 18.2 17.6 18.82 17.6 19c0 2 .22 3.8.55 5.4"/>
          <path d="M19 18.2C19.78 18.2 20.4 18.82 20.4 19c0 2-.22 3.8-.55 5.4"/>
        </svg>
      </div>
    </div>

    <!-- steps -->
    <div class="steps" id="steps">
      <div class="step active" id="s1"><div class="step-num">1</div>Scan</div>
      <div class="step-line"></div>
      <div class="step" id="s2"><div class="step-num">2</div>Verify</div>
      <div class="step-line"></div>
      <div class="step" id="s3"><div class="step-num">3</div>Done</div>
    </div>

    <div class="ttl ca" id="ttl">Verifying Device</div>
    <div class="sub" id="sub">Establishing secure handshake...</div>

    <div class="prog on" id="prog">
      <div class="prow">
        <span>Analysis in progress</span>
        <span id="pct">0%</span>
      </div>
      <div class="ptrack"><div class="pbar" id="pbar"></div></div>
    </div>

    <button class="btn ba" id="btn" disabled>Scanning...</button>
  </div>

  <div class="credit">Designed by <b>Jenil Dobariya</b></div>
</div>

<script>
/* ── canvas: aurora waves ── */
(function(){
  const cv=document.getElementById('cvs'),ctx=cv.getContext('2d');
  let W,H,t=0;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
  addEventListener('resize',resize);resize();
  function draw(){
    ctx.clearRect(0,0,W,H);
    t+=0.004;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      const yOff=H*0.3+i*H*0.15;
      const amp=40+i*20;
      const freq=0.008-i*0.002;
      const phase=t+i*1.2;
      ctx.moveTo(0,yOff);
      for(let x=0;x<=W;x+=4){
        ctx.lineTo(x,yOff+Math.sin(x*freq+phase)*amp+Math.cos(x*0.004+phase*0.7)*20);
      }
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
      const alpha=0.025-i*0.007;
      ctx.fillStyle=`rgba(124,110,255,${alpha})`;
      ctx.fill();
    }
    /* particles */
    if(!draw.pts){
      draw.pts=[];
      for(let i=0;i<70;i++)draw.pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*.9+.2});
    }
    draw.pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(124,110,255,0.28)';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Telegram user info + photo ── */
(function(){
  const tg=window.Telegram&&window.Telegram.WebApp;
  const user=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user;
  if(!user)return;

  document.getElementById('ucard').style.display='flex';

  const first=user.first_name||'';
  const last=user.last_name||'';
  const full=(first+' '+last).trim()||'User';
  const initials=((first[0]||'')+(last[0]||'')).toUpperCase()||'U';

  document.getElementById('uname').textContent=full;
  document.getElementById('uid').textContent='ID: '+user.id;

  if(user.is_premium)document.getElementById('premBadge').style.display='flex';

  const avEl=document.getElementById('av');
  avEl.textContent=initials;

  /* profile photo — Telegram WebApp provides it directly, no token needed */
  const photoUrl = user.photo_url;
  if(photoUrl){
    const img=new Image();
    img.onload=()=>{
      avEl.innerHTML='';
      avEl.appendChild(img);
    };
    img.onerror=()=>{ avEl.textContent=initials; }; // fallback to initials
    img.src=photoUrl;
  }
})();

/* ── helpers ── */
function setSpill(state){
  const b=document.getElementById('spill');
  const ring=document.getElementById('avRing');
  if(state==='ok'){
    b.className='spill ok';b.innerHTML='<span class="sdot" style="animation:none"></span>Active';
    ring.className='av-ring ok';
  }else if(state==='fail'){
    b.className='spill fail';b.innerHTML='<span class="sdot" style="animation:none"></span>Failed';
    ring.className='av-ring fail';
  }else{
    b.className='spill';b.innerHTML='<span class="sdot"></span>Scanning';
    ring.className='av-ring';
  }
}

function setStep(greenCount, failLast){
  // greenCount: steps to turn GREEN
  // failLast: if true, step 3 turns RED
  for(var i=1;i<=3;i++){
    var el=document.getElementById('s'+i);
    if(failLast && i===3) el.className='step err';
    else el.className = i<=greenCount ? 'step done' : 'step';
  }
  var lines=document.querySelectorAll('.step-line');
  lines.forEach(function(line,idx){
    if(failLast && idx===1) line.style.background='rgba(255,79,109,0.35)';
    else line.style.background=(idx+2<=greenCount)?'rgba(13,255,170,0.45)':'rgba(124,110,255,0.12)';
  });
}

const mcard=document.getElementById('mcard'),
      arc=document.getElementById('arc'),
      scanline=document.getElementById('scanline'),
      disc=document.getElementById('disc'),
      ttl=document.getElementById('ttl'),
      sub=document.getElementById('sub'),
      prog=document.getElementById('prog'),
      pbar=document.getElementById('pbar'),
      pct=document.getElementById('pct'),
      btn=document.getElementById('btn');

let timer=null,cur=0;

function animProg(to,ms,cb){
  clearInterval(timer);
  const from=cur,steps=50,inc=(to-from)/steps,delay=ms/steps;let n=0;
  timer=setInterval(()=>{
    n++;cur=Math.min(from+inc*n,to);
    pbar.style.width=cur+'%';pct.textContent=Math.round(cur)+'%';
    if(n>=steps){clearInterval(timer);if(cb)cb();}
  },delay);
}

const FP_SVG=`<svg viewBox="0 0 38 38" fill="none" stroke="#7c6eff" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"><path d="M19 4C10.72 4 4 10.72 4 19"/><path d="M19 4C27.28 4 34 10.72 34 19"/><path d="M19 8.8C13.32 8.8 8.8 13.32 8.8 19c0 5.5.8 9.4 2.2 12.2"/><path d="M19 8.8C24.68 8.8 29.2 13.32 29.2 19c0 5.5-.8 9.4-2.2 12.2"/><path d="M19 13.5C16.01 13.5 13.5 16.01 13.5 19c0 4 .52 6.8 1.45 9.2"/><path d="M19 13.5C21.99 13.5 24.5 16.01 24.5 19c0 4-.52 6.8-1.45 9.2"/><path d="M19 18.2C18.22 18.2 17.6 18.82 17.6 19c0 2 .22 3.8.55 5.4"/><path d="M19 18.2C19.78 18.2 20.4 18.82 20.4 19c0 2-.22 3.8-.55 5.4"/></svg>`;

function setSuccess(){
  mcard.className='mcard s-ok';
  arc.classList.remove('on');scanline.classList.remove('on');
  disc.innerHTML=`<svg class="popin" viewBox="0 0 38 38" fill="none" stroke="#0dffaa" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="19" cy="19" r="13"/><polyline points="13,19 17.5,23.5 25,14"/></svg>`;
  pbar.style.background='var(--g)';
  setStep(3);setSpill('ok');
  ttl.className='ttl cg';ttl.textContent='Verified Successfully';
  sub.textContent='Your device is verified. You can now use the bot.';
  prog.classList.remove('on');
  btn.disabled=false;btn.className='btn bg';btn.textContent='Continue to Bot';btn.onclick=closeApp;
}

function setFail(msg){
  mcard.className='mcard s-err';
  arc.classList.remove('on');scanline.classList.remove('on');
  disc.innerHTML=`<svg class="popin" viewBox="0 0 38 38" fill="none" stroke="#ff4f6d" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="19" cy="19" r="13"/><path d="M19 13v7.5"/><circle cx="19" cy="25" r="1.4" fill="#ff4f6d" stroke="none"/></svg>`;
  setStep(2,true);setSpill('fail');
  ttl.className='ttl cr';ttl.textContent='Verification Failed';
  sub.textContent=msg||'Multiple devices detected.';
  prog.classList.remove('on');
  btn.disabled=false;btn.className='btn br';btn.textContent='Continue to Bot';btn.onclick=closeApp;
}

function setNetworkError(){
  mcard.className='mcard s-err';
  arc.classList.remove('on');scanline.classList.remove('on');
  disc.innerHTML=`<svg class="popin" viewBox="0 0 38 38" fill="none" stroke="#ff4f6d" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l32 26M12 8A15 15 0 0 1 35 25M6 13a15 15 0 0 0-2 7"/><circle cx="19" cy="32" r="1.5" fill="#ff4f6d" stroke="none"/></svg>`;
  setStep(2,true);setSpill('fail');
  ttl.className='ttl cr';ttl.textContent='Connection Failed';
  sub.textContent='No internet. Check your connection and retry.';
  prog.classList.remove('on');
  btn.disabled=false;btn.className='btn br';btn.textContent='Retry';btn.onclick=retryVerify;
}

function closeApp(){
  if(window.Telegram&&window.Telegram.WebApp)window.Telegram.WebApp.close();
  else window.close();
}

function retryVerify(){
  cur=0;pbar.style.width='0%';pct.textContent='0%';
  mcard.className='mcard';
  disc.innerHTML=FP_SVG;
  arc.classList.add('on');scanline.classList.add('on');
  pbar.style.background='var(--a)';
  setStep(1);setSpill('scanning');
  ttl.className='ttl ca';ttl.textContent='Verifying Device';
  sub.textContent='Establishing secure handshake...';
  prog.classList.add('on');
  btn.disabled=true;btn.className='btn ba';btn.textContent='Scanning...';
  verify();
}

function fp(){
  return btoa([
    navigator.userAgent,navigator.language,
    screen.width,screen.height,navigator.platform,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.hardwareConcurrency||0,navigator.deviceMemory||0
  ].join("|"));
}

async function verify(){
  setStep(1);
  arc.classList.add('on');scanline.classList.add('on');
  animProg(45,900,()=>{
    setStep(2);
    animProg(80,1000,null);
  });
  const f=fp();
  let data;
  try{
    const params=new URLSearchParams(location.search);
    const botusername=params.get("botusername")||"";
    const r=await fetch("/api/verify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({fp:f,botusername:botusername})
    });
    data=await r.json();
  }catch(e){
    console.log("VERIFY ERROR:",e);
    animProg(100,400,()=>setNetworkError());
    return;
  }
  // 1. Send webhook to bot FIRST so it processes before user sees result
  const params2=new URLSearchParams(location.search);
  const wh=params2.get("webhook");
  const botusername=params2.get("botusername")||"";
  if(wh){
    try{
      await fetch(decodeURIComponent(wh),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({status:data.status,message:data.message,fingerprint:f,botusername:botusername})
      });
    }catch(e){console.log("WEBHOOK ERROR:",e);}
  }

  // 2. Animate progress to 100% over 3s — gives bot time to send message
  animProg(100,1800,null);
  sub.textContent="Processing result...";
  await new Promise(r=>setTimeout(r,2000));

  // 3. Now show result
  if(data.status==='pass')setSuccess();
  else setFail(data.message==='Device already used'?'Multiple devices detected.':(data.message||'Verification failed.'));
}

window.addEventListener("load",()=>setTimeout(verify,500));
</script>
