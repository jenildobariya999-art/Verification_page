<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Verification</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f172a;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
max-width:350px;
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
}

.loader{
width:70px;
height:70px;
border:6px solid rgba(255,255,255,.15);
border-top:6px solid #22c55e;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.success{
font-size:55px;
display:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

#status{
margin-top:15px;
font-size:15px;
}
</style></head>
<body><div class="card"><h2>🔐 Device Verification</h2><div id="loader" class="loader"></div><div id="success" class="success">
✅
</div><p id="status">
Click verify to continue
</p><button id="verifyBtn">
Verify Now
</button></div><script>

function fingerprint(){

return btoa(
[
navigator.userAgent,
navigator.platform,
navigator.language,
screen.width,
screen.height,
new Date().getTimezoneOffset()
].join("|")
);

}

document.getElementById("verifyBtn")
.onclick = async ()=>{

const params =
new URLSearchParams(location.search);

const webhook =
decodeURIComponent(
params.get("webhook") || ""
);

document.getElementById(
"status"
).innerText =
"Verifying device...";

const fp = fingerprint();

try{

await fetch(
webhook,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
status:"pass",
message:"Verified Successfully",
fingerprint:fp
})
}
);

document.getElementById(
"loader"
).style.display="none";

document.getElementById(
"success"
).style.display="block";

document.getElementById(
"status"
).innerText=
"Verification Successful";

setTimeout(()=>{
window.close();
},1500);

}catch(e){

document.getElementById(
"status"
).innerText=
"Verification Failed";

}

};

</script></body>
</html>
