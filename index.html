<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Check</title><style>
body{
margin:0;
font-family:system-ui;
background:#0b0f1a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:92%;
max-width:380px;
background:#141a2a;
border-radius:18px;
padding:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

/* HEADER */
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.user{
display:flex;
gap:10px;
align-items:center;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#222;
}

.badge{
padding:6px 10px;
border-radius:20px;
font-size:12px;
background:#1f2a44;
color:#60a5fa;
}

/* STATUS ICON */
.circle{
width:120px;
height:120px;
margin:20px auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:3px solid #3b82f6;
box-shadow:0 0 20px #1d4ed8;
}

.circle.fail{
border-color:#ef4444;
box-shadow:0 0 20px #ef4444;
}

.circle.success{
border-color:#22c55e;
box-shadow:0 0 20px #22c55e;
}

.icon{
font-size:40px;
}

/* TEXT */
.title{
font-size:22px;
margin-top:10px;
font-weight:600;
}

.sub{
font-size:13px;
opacity:0.7;
margin-top:6px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.blue{background:#3b82f6;color:white;}
.green{background:#22c55e;color:black;}
.red{background:#ef4444;color:white;}

.hidden{display:none;}
</style></head><body><div class="card"><div class="top">
<div class="user">
<div class="avatar"></div>
<div>
<div><b>JENIL !!!</b></div>
<div style="font-size:11px;opacity:0.6">ID: 6925391837</div>
</div>
</div><div id="statusTag" class="badge">SCANNING</div>
</div><div id="screen"><!-- SCANNING --><div id="scan"><div class="scanner"><div class="scan-line"></div><div class="bars">
<div></div><div></div><div></div><div></div><div></div>
</div></div><div class="title">Verifying Device</div>
<div class="sub">Establishing secure handshake...</div><button class="btn blue" onclick="start()">START SCAN</button>
  
</div><!-- FAILED --><div id="fail" class="hidden">
<div class="circle fail">
<div class="icon">⚠️</div>
</div><div class="title" style="color:#ef4444">Verification Failed</div>
<div class="sub">Multiple devices detected</div><button class="btn red">CONTINUE TO BOT</button>

</div><!-- SUCCESS --><div id="success" class="hidden">
<div class="circle success">
<div class="icon">✔️</div>
</div><div class="title" style="color:#22c55e">Verified Successfully</div>
<div class="sub">You can use our bot now</div><button class="btn green">CONTINUE TO BOT</button>

</div></div></div><script>

function fingerprint(){
return btoa([
navigator.userAgent,
navigator.language,
screen.width,
screen.height
].join("|"));
}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function start(){

document.getElementById("statusTag").innerText="SCANNING";

await sleep(1200);

/* CALL YOUR API */
const res = await fetch("/api/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({fp:fingerprint()})
});

const data = await res.json();

/* SWITCH UI */
document.getElementById("scan").classList.add("hidden");

if(data.status==="pass"){
document.getElementById("success").classList.remove("hidden");
document.getElementById("statusTag").innerText="ACTIVE";
}

if(data.status==="fail"){
document.getElementById("fail").classList.remove("hidden");
document.getElementById("statusTag").innerText="FAILED";
}

}

</script></body>
</html>
