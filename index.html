<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Verify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:  #3b82f6;
      --green: #10f090;
      --red:   #f04040;
    }

    html, body {
      height: 100%;
      background: #0a0d1a;
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, transparent 70%);
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
    }

    .card-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      padding: 16px;
    }

    .card {
      background: rgba(14,18,32,0.97);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 22px;
      padding: 44px 28px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: radial-gradient(ellipse at 50% -10%, rgba(59,130,246,0.1) 0%, transparent 55%);
      pointer-events: none;
    }

    /* icon area */
    .icon-wrap {
      width: 128px;
      height: 128px;
      margin: 0 auto 32px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-spin {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: var(--blue);
      border-right-color: rgba(59,130,246,0.25);
      animation: spin 1.3s linear infinite;
      opacity: 0;
      transition: opacity 0.35s, border-top-color 0.4s, border-right-color 0.4s;
    }
    .ring-spin.on { opacity: 1; }

    .ring-static {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.22);
      transition: border-color 0.4s;
    }

    .icon-disc {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: rgba(59,130,246,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s;
    }
    .icon-disc svg { width: 42px; height: 42px; }

    /* state: success */
    .s-success .ring-static { border-color: rgba(16,240,144,0.35); }
    .s-success .icon-disc   { background: rgba(16,240,144,0.09); }

    /* state: fail */
    .s-fail .ring-static { border-color: rgba(240,64,64,0.35); }
    .s-fail .icon-disc   { background: rgba(240,64,64,0.09); }

    @keyframes spin { to { transform: rotate(360deg); } }

    .main-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      transition: color 0.3s;
    }
    .c-blue  { color: var(--blue); }
    .c-green { color: var(--green); }
    .c-red   { color: var(--red); }
    .c-white { color: #fff; }

    .main-sub {
      font-size: 14px;
      color: rgba(180,192,215,0.65);
      line-height: 1.65;
      margin-bottom: 28px;
      min-height: 46px;
    }

    /* progress */
    .prog-wrap { display: none; margin-bottom: 26px; }
    .prog-wrap.show { display: block; }
    .prog-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.9px;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .prog-track {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: var(--blue);
      transition: width 0.25s ease, background 0.4s;
    }

    /* button */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 13px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1.1px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn:hover   { transform: translateY(-2px); }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    .btn-blue  { background: var(--blue);  color: #fff; box-shadow: 0 6px 22px rgba(59,130,246,0.38); }
    .btn-green { background: var(--green); color: #0a0d1a; box-shadow: 0 6px 22px rgba(16,240,144,0.38); }
    .btn-red   { background: var(--red);   color: #fff; box-shadow: 0 6px 22px rgba(240,64,64,0.38); }

    .footer {
      position: fixed;
      bottom: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.18);
      z-index: 2;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="particles" id="pts"></div>

<div class="card-wrap">
  <div class="card" id="card">

    <div class="icon-wrap">
      <div class="ring-spin on" id="ringSpin"></div>
      <div class="ring-static" id="ringStatic"></div>
      <div class="icon-disc" id="iconDisc">
        <svg id="iconSvg" viewBox="0 0 42 42" fill="none" stroke="#3b82f6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <!-- fingerprint icon -->
          <path d="M21 7C13.27 7 7 13.27 7 21"/>
          <path d="M21 7C28.73 7 35 13.27 35 21"/>
          <path d="M21 11.5C15.75 11.5 11.5 15.75 11.5 21c0 5.5.8 9.5 2.3 12.5"/>
          <path d="M21 11.5C26.25 11.5 30.5 15.75 30.5 21c0 5.5-.8 9.5-2.3 12.5"/>
          <path d="M21 16C17.69 16 15 18.69 15 21c0 4 .55 7 1.6 9.5"/>
          <path d="M21 16C24.31 16 27 18.69 27 21c0 4-.55 7-1.6 9.5"/>
          <path d="M21 20.5C20.17 20.5 19.5 21.17 19.5 21c0 2 .25 4 .65 6"/>
          <path d="M21 20.5C21.83 20.5 22.5 21.17 22.5 21c0 2-.25 4-.65 6"/>
        </svg>
      </div>
    </div>

    <div class="main-title c-blue" id="title">Verifying Device</div>
    <div class="main-sub" id="sub">Establishing secure handshake...</div>

    <div class="prog-wrap show" id="progWrap">
      <div class="prog-labels">
        <span>ANALYSIS IN PROGRESS</span>
        <span id="pct">0%</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="progFill"></div>
      </div>
    </div>

    <button class="btn btn-blue" id="btn" disabled>SCANNING...</button>

  </div>
</div>

<div class="footer">© 2026 Prince | Designed By Prince</div>

<script>
/* particles */
(function(){
  const c=document.getElementById('pts');
  for(let i=0;i<16;i++){
    const d=document.createElement('div'); d.className='particle';
    const s=30+Math.random()*130;
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:${-s}px;animation-duration:${9+Math.random()*18}s;animation-delay:${Math.random()*14}s;`;
    c.appendChild(d);
  }
})();

const card=document.getElementById('card'),
      ringSpin=document.getElementById('ringSpin'),
      iconDisc=document.getElementById('iconDisc'),
      title=document.getElementById('title'),
      sub=document.getElementById('sub'),
      progWrap=document.getElementById('progWrap'),
      progFill=document.getElementById('progFill'),
      pctEl=document.getElementById('pct'),
      btn=document.getElementById('btn');

let pTimer=null, curPct=0;

function animProg(target,ms,cb){
  clearInterval(pTimer);
  const from=curPct, steps=50, inc=(target-from)/steps, delay=ms/steps;
  let n=0;
  pTimer=setInterval(()=>{
    n++;curPct=Math.min(from+inc*n,target);
    progFill.style.width=curPct+'%';
    pctEl.textContent=Math.round(curPct)+'%';
    if(n>=steps){clearInterval(pTimer);if(cb)cb();}
  },delay);
}

function setSuccess(){
  card.className='card s-success';
  ringSpin.classList.remove('on');
  title.className='main-title c-green'; title.textContent='Verified Successfully';
  sub.textContent="You're verified successfully, you can use our bot now.";
  progWrap.classList.remove('show');
  iconDisc.innerHTML=`<svg viewBox="0 0 42 42" fill="none" stroke="#10f090" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="21" cy="21" r="14"/><polyline points="15,21 19,25 27,16"/></svg>`;
  btn.disabled=false; btn.className='btn btn-green'; btn.textContent='CONTINUE TO BOT'; btn.onclick=toBot;
}

function setFail(msg){
  card.className='card s-fail';
  ringSpin.classList.remove('on');
  title.className='main-title c-red'; title.textContent='Verification Failed';
  sub.textContent=msg||'Multiple devices detected';
  progWrap.classList.remove('show');
  iconDisc.innerHTML=`<svg viewBox="0 0 42 42" fill="none" stroke="#f04040" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="21" cy="21" r="14"/><path d="M21 14v9"/><circle cx="21" cy="27" r="1.2" fill="#f04040" stroke="none"/></svg>`;
  btn.disabled=false; btn.className='btn btn-red'; btn.textContent='CONTINUE TO BOT'; btn.onclick=toBot;
}

function toBot(){ window.location.href='https://t.me/'; }

function fp(){
  return btoa([navigator.userAgent,navigator.language,screen.width,screen.height,navigator.platform].join("|"));
}

async function verify(){
  ringSpin.classList.add('on');
  animProg(80,1800,null);
  const f=fp();
  let data;
  try{
    // read botId from URL: ?botId=CashLoot  (set this in your TBC /start link)
    const params = new URLSearchParams(location.search);
    const botId  = params.get("botId") || "default";
    const r=await fetch("/api/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({fp:f, botId})});
    data=await r.json();
  }catch(e){
    animProg(100,400,()=>setFail('Network error — please try again'));
    return;
  }
  animProg(100,500,()=>{
    if(data.status==='pass') setSuccess();
    else setFail(data.message==='Device already used'?'Multiple devices detected':(data.message||'Verification failed'));
  });
  const params2 = new URLSearchParams(location.search);
  const wh=params2.get("webhook");
  const botId2=params2.get("botId")||"default";
  if(wh) await fetch(decodeURIComponent(wh),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:data.status,message:data.message,fingerprint:f,botId:botId2})});
}

window.addEventListener('load',()=>setTimeout(verify,500));
</script>
</body>
</html>
