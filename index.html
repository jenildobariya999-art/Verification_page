<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Verification</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:400px;
    background:#1e293b;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.status{
    margin-top:15px;
}
</style>
</head>
<body>

<div class="card">

    <h2>🔐 Device Verification</h2>

    <p>
        Complete verification to continue using the bot.
    </p>

    <button class="btn" onclick="verify()">
        Verify Now
    </button>

    <div class="status" id="status"></div>

</div>

<script>

async function verify(){

    const params = new URLSearchParams(
        window.location.search
    );

    const webhook = decodeURIComponent(
        params.get("webhook")
    );

    const hash = params.get("hash");

    const fingerprint = {
        hash: hash,
        userAgent: navigator.userAgent,
        language: navigator.language,
        platform: navigator.platform,
        timezone:
            Intl.DateTimeFormat()
            .resolvedOptions()
            .timeZone,
        screen:
            screen.width + "x" + screen.height
    };

    document.getElementById("status").innerHTML =
        "⏳ Verifying...";

    try{

        const req = await fetch(
            webhook,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    status:"pass",
                    message:"Verified Successfully",
                    device:fingerprint
                })
            }
        );

        if(req.ok){

            document.getElementById("status").innerHTML =
                "✅ Verification Successful";

        }else{

            document.getElementById("status").innerHTML =
                "❌ Verification Failed";

        }

    }catch(err){

        document.getElementById("status").innerHTML =
            "❌ Verification Failed";

    }
}

</script>

</body>
</html>
