<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:#0b1220;
color:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:360px;
background:#111827;
padding:22px;
border-radius:14px;
border:1px solid #1f2937;
}

h2{
font-size:18px;
margin-bottom:10px;
}

.text{
font-size:14px;
opacity:0.8;
line-height:1.5;
min-height:60px;
}

.loader{
height:3px;
width:100%;
background:#1f2937;
overflow:hidden;
border-radius:10px;
margin:15px 0;
display:none;
}

.bar{
height:100%;
width:40%;
background:#22c55e;
animation:move 1s infinite;
}

@keyframes move{
0%{transform:translateX(-100%)}
100%{transform:translateX(250%)}
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:500;
cursor:pointer;
}

.bad{
color:#ef4444;
}

.good{
color:#22c55e;
}
</style>
</head>

<body>

<div class="box">

<h2>Device Verification</h2>

<div class="loader" id="loader">
<div class="bar"></div>
</div>

<div class="text" id="text">
Ready to verify your device.
</div>

<button class="btn" onclick="verify()">Verify</button>

</div>

<script>

function fp(){
return btoa([
navigator.userAgent,
navigator.language,
screen.width,
screen.height
].join("|"));
}

async function verify(){

document.getElementById("loader").style.display="block";

const steps = [
"Checking device identity...",
"Validating session...",
"Connecting secure server..."
];

const text = document.getElementById("text");

for(let s of steps){
text.innerText = s;
await new Promise(r=>setTimeout(r,900));
}

const params = new URLSearchParams(location.search);
const webhook = params.get("webhook");

const res = await fetch("/api/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({fp:fp()})
});

const data = await res.json();

document.getElementById("loader").style.display="none";

text.innerText = data.message;

if(data.status==="fail"){
text.classList.add("bad");
}else{
text.classList.add("good");
}

if(webhook){
await fetch(decodeURIComponent(webhook),{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
status:data.status,
message:data.message,
fingerprint:fp()
})
});
}

}

</script>

</body>
</html>
