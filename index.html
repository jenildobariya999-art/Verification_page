<!DOCTYPE html>
<html>
<head>
<title>Device Verify</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle at top,#111827,#05060a);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* card */
.card{
    width:340px;
    padding:25px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,140,255,0.15);
    text-align:center;
}

/* scan ring */
.ring{
    width:120px;
    height:120px;
    margin:20px auto;
    border-radius:50%;
    border:3px solid rgba(0,140,255,0.3);
    position:relative;
    overflow:hidden;
}

.ring::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background: linear-gradient(transparent,rgba(0,140,255,0.6),transparent);
    animation: scan 2s linear infinite;
}

@keyframes scan{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* fingerprint icon */
.icon{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#3ea6ff;
}

/* progress bar */
.bar{
    width:100%;
    height:8px;
    background:#111827;
    border-radius:10px;
    overflow:hidden;
    margin-top:15px;
}

.fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg,#00aaff,#0066ff);
    transition:0.4s;
}

/* button */
button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#0066ff;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0088ff;
}

/* status */
#status{
    font-size:18px;
    margin-top:10px;
    opacity:0.9;
}
</style>
</head>

<body>

<div class="card">

    <h2>Device Verification</h2>
    
    <div class="ring">
        <div class="icon">👆</div>
    </div>

    <div id="status">Click verify to start scan</div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <button onclick="verify()">Verify Now</button>

</div>

<script>
function fingerprint(){
return btoa([
navigator.userAgent,
navigator.language,
screen.width,
screen.height,
navigator.platform
].join("|"));
}

function animateBar(){
let fill = document.getElementById("fill");
let width = 0;

let t = setInterval(()=>{
    if(width >= 90){
        clearInterval(t);
    } else {
        width += 3;
        fill.style.width = width + "%";
    }
},60);
}

async function verify(){

document.getElementById("status").innerText = "Scanning device...";
animateBar();

const fp = fingerprint();
const params = new URLSearchParams(location.search);
const webhook = params.get("webhook");

const res = await fetch("/api/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({fp})
});

const data = await res.json();

document.getElementById("status").innerText = data.message;

// finish bar
document.getElementById("fill").style.width = "100%";

// send webhook
if(webhook){
await fetch(decodeURIComponent(webhook),{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
status:data.status,
message:data.message,
fingerprint:fp
})
});
}

}
</script>

</body>
</html>
