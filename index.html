<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --accent:#6c63ff;
      --green:#22d97a;
      --red:#ff5252;
      --bg:#07090f;
      --card:#0e1120;
      --border:rgba(108,99,255,0.18);
    }

    html,body{
      min-height:100vh;
      background:var(--bg);
      font-family:'Space Grotesk',sans-serif;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

    .wrap{
      position:relative;z-index:1;
      width:100%;max-width:320px;
      padding:16px;
      display:flex;flex-direction:column;align-items:center;gap:16px;
    }

    /* top label */
    .chip{
      display:flex;align-items:center;gap:7px;
      background:rgba(108,99,255,0.1);
      border:1px solid rgba(108,99,255,0.22);
      border-radius:99px;
      padding:5px 14px;
      font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
      color:rgba(180,174,255,0.85);
    }
    .chip-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 6px var(--accent);
      animation:blink 1.8s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

    /* card */
    .card{
      width:100%;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:40px 24px 32px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:'';
      position:absolute;top:0;left:20%;right:20%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(108,99,255,0.5),transparent);
    }

    /* hex grid texture */
    .card::after{
      content:'';
      position:absolute;inset:0;
      background-image:radial-gradient(circle,rgba(108,99,255,0.04) 1px,transparent 1px);
      background-size:18px 18px;
      pointer-events:none;
    }

    /* icon */
    .icon-wrap{
      width:116px;height:116px;
      margin:0 auto 28px;
      position:relative;
      display:flex;align-items:center;justify-content:center;
    }

    .spin-ring{
      position:absolute;inset:0;border-radius:50%;
      border:2px solid transparent;
      border-top-color:var(--accent);
      border-left-color:rgba(108,99,255,0.25);
      animation:spin 1.4s linear infinite;
      opacity:0;transition:opacity 0.4s;
    }
    .spin-ring.on{opacity:1}

    .mid-ring{
      position:absolute;inset:9px;border-radius:50%;
      border:1px solid rgba(108,99,255,0.15);
      transition:border-color 0.5s;
    }

    .disc{
      width:78px;height:78px;border-radius:50%;
      background:rgba(108,99,255,0.08);
      border:1px solid rgba(108,99,255,0.18);
      display:flex;align-items:center;justify-content:center;
      transition:all 0.5s;
      position:relative;z-index:1;
    }
    .disc svg{width:36px;height:36px}

    .s-ok .mid-ring{border-color:rgba(34,217,122,0.28)}
    .s-ok .disc{background:rgba(34,217,122,0.07);border-color:rgba(34,217,122,0.2)}
    .s-ok .spin-ring{border-top-color:var(--green);border-left-color:rgba(34,217,122,0.2)}

    .s-err .mid-ring{border-color:rgba(255,82,82,0.28)}
    .s-err .disc{background:rgba(255,82,82,0.07);border-color:rgba(255,82,82,0.2)}
    .s-err .spin-ring{border-top-color:var(--red);border-left-color:rgba(255,82,82,0.2)}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes popin{0%{transform:scale(0.4);opacity:0}65%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
    .popin{animation:popin 0.4s cubic-bezier(.34,1.56,.64,1) forwards}

    /* text */
    .ttl{
      font-size:20px;font-weight:700;letter-spacing:-0.3px;
      margin-bottom:8px;transition:color 0.4s;
    }
    .c-accent{color:var(--accent)}
    .c-green{color:var(--green)}
    .c-red{color:var(--red)}

    .sub{
      font-size:13px;font-weight:400;
      color:rgba(160,170,200,0.6);
      line-height:1.6;margin-bottom:24px;min-height:42px;
    }

    /* progress */
    .prog{display:none;margin-bottom:22px}
    .prog.on{display:block}
    .prog-row{
      display:flex;justify-content:space-between;
      font-size:10px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;
      color:rgba(108,99,255,0.75);margin-bottom:6px;
    }
    .prog-track{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
    .prog-fill{height:100%;width:0%;border-radius:99px;background:var(--accent);transition:width 0.2s,background 0.4s}

    /* button */
    .btn{
      width:100%;padding:14px;border:none;border-radius:14px;
      font-family:'Space Grotesk',sans-serif;
      font-size:13px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
      cursor:pointer;
      transition:transform 0.15s,opacity 0.15s;
      position:relative;overflow:hidden;
    }
    .btn::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%);
      pointer-events:none;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:scale(0.97)}
    .btn:disabled{opacity:0.3;cursor:not-allowed;transform:none!important}

    .b-accent{background:var(--accent);color:#fff;box-shadow:0 8px 28px rgba(108,99,255,0.38)}
    .b-green{background:var(--green);color:#051a0d;box-shadow:0 8px 28px rgba(34,217,122,0.3)}
    .b-red{background:var(--red);color:#fff;box-shadow:0 8px 28px rgba(255,82,82,0.3)}

    /* user info bar */
    .user-bar{
      width:100%;
      background:rgba(14,17,32,0.9);
      border:1px solid rgba(108,99,255,0.14);
      border-radius:14px;
      padding:10px 14px;
      display:flex;align-items:center;gap:10px;
    }
    .user-avatar{
      width:36px;height:36px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,#6c63ff,#a78bfa);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;color:#fff;letter-spacing:0;
      border:1.5px solid rgba(108,99,255,0.35);
    }
    .user-info{flex:1;min-width:0;text-align:left}
    .user-name{
      font-size:13px;font-weight:600;color:#e0deff;
      display:flex;align-items:center;gap:5px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .star-badge{
      display:inline-flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#f59e0b,#fbbf24);
      border-radius:99px;padding:1px 5px;
      font-size:9px;font-weight:700;color:#431407;
      letter-spacing:0.3px;flex-shrink:0;
    }
    .user-id{
      font-size:10px;color:rgba(140,148,180,0.6);
      margin-top:1px;font-weight:500;
    }
    .scan-badge{
      flex-shrink:0;
      display:flex;align-items:center;gap:5px;
      background:rgba(108,99,255,0.12);
      border:1px solid rgba(108,99,255,0.25);
      border-radius:99px;padding:4px 10px;
      font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
      color:rgba(180,174,255,0.9);
    }
    .scan-badge.ok{background:rgba(34,217,122,0.1);border-color:rgba(34,217,122,0.28);color:rgba(100,255,180,0.9)}
    .scan-badge.fail{background:rgba(255,82,82,0.1);border-color:rgba(255,82,82,0.28);color:rgba(255,150,150,0.9)}
    .scan-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.8s ease-in-out infinite}

    /* credit */
    .credit{
      font-size:11px;font-weight:500;letter-spacing:0.4px;
      color:rgba(255,255,255,0.18);
    }
    .credit strong{color:rgba(108,99,255,0.55);font-weight:600}
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrap">
  <div class="chip">
    <span class="chip-dot"></span>
    Security Check
  </div>

  <div class="user-bar" id="userBar" style="display:none">
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-info">
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-id" id="userId">ID: —</div>
    </div>
    <div class="scan-badge" id="scanBadge">
      <span class="scan-dot"></span>
      Scanning
    </div>
  </div>

  <div class="card" id="card">
    <div class="icon-wrap">
      <div class="spin-ring on" id="spinRing"></div>
      <div class="mid-ring" id="midRing"></div>
      <div class="disc" id="disc">
        <svg viewBox="0 0 36 36" fill="none" stroke="#6c63ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 4C10.27 4 4 10.27 4 18"/>
          <path d="M18 4C25.73 4 32 10.27 32 18"/>
          <path d="M18 8.5C12.75 8.5 8.5 12.75 8.5 18c0 5.2.75 8.8 2.1 11.5"/>
          <path d="M18 8.5C23.25 8.5 27.5 12.75 27.5 18c0 5.2-.75 8.8-2.1 11.5"/>
          <path d="M18 13C14.69 13 12 15.69 12 18c0 3.8.5 6.5 1.4 8.8"/>
          <path d="M18 13C21.31 13 24 15.69 24 18c0 3.8-.5 6.5-1.4 8.8"/>
          <path d="M18 17.5C17.17 17.5 16.5 18.17 16.5 18c0 1.8.22 3.5.55 5"/>
          <path d="M18 17.5C18.83 17.5 19.5 18.17 19.5 18c0 1.8-.22 3.5-.55 5"/>
        </svg>
      </div>
    </div>

    <div class="ttl c-accent" id="ttl">Verifying Device</div>
    <div class="sub" id="sub">Establishing secure handshake...</div>

    <div class="prog on" id="prog">
      <div class="prog-row">
        <span>Analysis in progress</span>
        <span id="pct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="fill"></div></div>
    </div>

    <button class="btn b-accent" id="btn" disabled>Scanning...</button>
  </div>

  <div class="credit">Designed by <strong>Jenil Dobariya</strong></div>
</div>

<script>
(function(){
  const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){
    W=cv.width=innerWidth;H=cv.height=innerHeight;
    pts=[];
    for(let i=0;i<90;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.1+.3});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(108,99,255,0.35)';ctx.fill();
    });
    pts.forEach((a,i)=>{
      for(let j=i+1;j<pts.length;j++){
        const b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(108,99,255,${(1-d/90)*0.12})`;ctx.lineWidth=.6;ctx.stroke();
        }
      }
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();draw();
})();

/* ── user info from Telegram WebApp ── */
(function(){
  const bar=document.getElementById('userBar');
  const avatarEl=document.getElementById('userAvatar');
  const nameEl=document.getElementById('userName');
  const idEl=document.getElementById('userId');

  const tg=window.Telegram&&window.Telegram.WebApp;
  const user=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user;

  if(!user){
    bar.style.display='none';
    return;
  }

  bar.style.display='flex';

  const first=user.first_name||'';
  const last=user.last_name||'';
  const full=(first+' '+last).trim()||'User';
  const initials=((first[0]||'')+(last[0]||'')).toUpperCase()||'U';

  avatarEl.textContent=initials;
  idEl.textContent='ID: '+user.id;

  const isPremium=!!user.is_premium;
  nameEl.innerHTML='';
  const nameSpan=document.createElement('span');
  nameSpan.textContent=full;
  nameSpan.style.cssText='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;display:inline-block';
  nameEl.appendChild(nameSpan);
  if(isPremium){
    const star=document.createElement('span');
    star.className='star-badge';
    star.textContent='★ Premium';
    nameEl.appendChild(star);
  }
})();

/* ── scan badge state updater ── */
function setScanBadge(state){
  const b=document.getElementById('scanBadge');
  if(state==='ok'){
    b.className='scan-badge ok';
    b.innerHTML='<span class="scan-dot" style="animation:none"></span> Active';
  } else if(state==='fail'){
    b.className='scan-badge fail';
    b.innerHTML='<span class="scan-dot" style="animation:none"></span> Failed';
  } else {
    b.className='scan-badge';
    b.innerHTML='<span class="scan-dot"></span> Scanning';
  }
}

const card=document.getElementById('card'),
      spinRing=document.getElementById('spinRing'),
      disc=document.getElementById('disc'),
      ttl=document.getElementById('ttl'),
      sub=document.getElementById('sub'),
      prog=document.getElementById('prog'),
      fill=document.getElementById('fill'),
      pct=document.getElementById('pct'),
      btn=document.getElementById('btn');

let timer=null,cur=0;

function animProg(to,ms,cb){
  clearInterval(timer);
  const from=cur,steps=50,inc=(to-from)/steps,delay=ms/steps;let n=0;
  timer=setInterval(()=>{
    n++;cur=Math.min(from+inc*n,to);
    fill.style.width=cur+'%';pct.textContent=Math.round(cur)+'%';
    if(n>=steps){clearInterval(timer);if(cb)cb();}
  },delay);
}

const FP_SVG=`<svg viewBox="0 0 36 36" fill="none" stroke="#6c63ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 4C10.27 4 4 10.27 4 18"/><path d="M18 4C25.73 4 32 10.27 32 18"/><path d="M18 8.5C12.75 8.5 8.5 12.75 8.5 18c0 5.2.75 8.8 2.1 11.5"/><path d="M18 8.5C23.25 8.5 27.5 12.75 27.5 18c0 5.2-.75 8.8-2.1 11.5"/><path d="M18 13C14.69 13 12 15.69 12 18c0 3.8.5 6.5 1.4 8.8"/><path d="M18 13C21.31 13 24 15.69 24 18c0 3.8-.5 6.5-1.4 8.8"/><path d="M18 17.5C17.17 17.5 16.5 18.17 16.5 18c0 1.8.22 3.5.55 5"/><path d="M18 17.5C18.83 17.5 19.5 18.17 19.5 18c0 1.8-.22 3.5-.55 5"/></svg>`;

function setSuccess(){
  card.className='card s-ok';
  spinRing.classList.remove('on');
  disc.innerHTML=`<svg class="popin" viewBox="0 0 36 36" fill="none" stroke="#22d97a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="12"/><polyline points="12.5,18 16.5,22 23.5,13.5"/></svg>`;
  ttl.className='ttl c-green';ttl.textContent='Verified Successfully';
  sub.textContent='Your device is verified. You can use the bot now.';
  prog.classList.remove('on');
  setScanBadge('ok');
  btn.disabled=false;btn.className='btn b-green';btn.textContent='Continue to Bot';btn.onclick=closeApp;
}

function setFail(msg){
  card.className='card s-err';
  spinRing.classList.remove('on');
  disc.innerHTML=`<svg class="popin" viewBox="0 0 36 36" fill="none" stroke="#ff5252" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="12"/><path d="M18 12.5v7"/><circle cx="18" cy="23.5" r="1.3" fill="#ff5252" stroke="none"/></svg>`;
  ttl.className='ttl c-red';ttl.textContent='Verification Failed';
  sub.textContent=msg||'Multiple devices detected.';
  prog.classList.remove('on');
  setScanBadge('fail');
  btn.disabled=false;btn.className='btn b-red';btn.textContent='Continue to Bot';btn.onclick=closeApp;
}

function setNetworkError(){
  card.className='card s-err';
  spinRing.classList.remove('on');
  disc.innerHTML=`<svg class="popin" viewBox="0 0 36 36" fill="none" stroke="#ff5252" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8l28 24M14 8.5A13 13 0 0 1 32 24M8 13a13 13 0 0 0-2.5 7.5"/><circle cx="18" cy="30" r="1.5" fill="#ff5252" stroke="none"/></svg>`;
  ttl.className='ttl c-red';ttl.textContent='Connection Failed';
  sub.textContent='No internet connection. Check your network and retry.';
  prog.classList.remove('on');
  setScanBadge('fail');
  btn.disabled=false;btn.className='btn b-red';btn.textContent='Retry';btn.onclick=retryVerify;
}

function closeApp(){
  if(window.Telegram&&window.Telegram.WebApp)window.Telegram.WebApp.close();
  else window.close();
}

function retryVerify(){
  setScanBadge('scanning');
  cur=0;fill.style.width='0%';pct.textContent='0%';
  card.className='card';
  disc.innerHTML=FP_SVG;
  ttl.className='ttl c-accent';ttl.textContent='Verifying Device';
  sub.textContent='Establishing secure handshake...';
  prog.classList.add('on');
  spinRing.classList.add('on');
  btn.disabled=true;btn.className='btn b-accent';btn.textContent='Scanning...';
  verify();
}

function fp(){
  return btoa([
    navigator.userAgent,
    navigator.language,
    screen.width,
    screen.height,
    navigator.platform,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.hardwareConcurrency||0,
    navigator.deviceMemory||0
  ].join("|"));
}

async function verify(){
  spinRing.classList.add('on');
  animProg(80,1800,null);
  const f=fp();
  let data;
  try{
    const params=new URLSearchParams(location.search);
    const botusername=params.get("botusername")||"";
    const r=await fetch("/api/verify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({fp:f,botusername:botusername})
    });
    data=await r.json();
  }catch(e){
    console.log("VERIFY ERROR:",e);
    animProg(100,400,()=>setNetworkError());
    return;
  }
  animProg(100,500,()=>{
    if(data.status==='pass')setSuccess();
    else setFail(data.message==='Device already used'?'Multiple devices detected.':(data.message||'Verification failed.'));
  });
  const params2=new URLSearchParams(location.search);
  const wh=params2.get("webhook");
  const botusername=params2.get("botusername")||"";
  if(wh){
    await fetch(decodeURIComponent(wh),{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({status:data.status,message:data.message,fingerprint:f,botusername:botusername})
    });
  }
}

window.addEventListener("load",()=>setTimeout(verify,500));
</script>
</body>
</html>
