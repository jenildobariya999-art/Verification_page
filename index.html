<!DOCTYPE html>
<html>
<head>
<title>Device Verify</title>
</head>
<body style="background:#0f172a;color:#fff;text-align:center;padding-top:100px;">

<h2 id="status">Click Verify</h2>

<button onclick="verify()">Verify Now</button>

<script>
function fingerprint(){
return btoa([
navigator.userAgent,
navigator.language,
screen.width,
screen.height,
navigator.platform
].join("|"));
}

async function verify(){

document.getElementById("status").innerText =
"Checking device...";

const fp = fingerprint();

const params = new URLSearchParams(location.search);
const webhook = params.get("webhook");

const res = await fetch("/api/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({fp})
});

const data = await res.json();

document.getElementById("status").innerText =
data.message;

// send result to TBC webhook
if(webhook){
await fetch(decodeURIComponent(webhook),{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
status:data.status,
message:data.message,
fingerprint:fp
})
});
}

}
</script>

</body>
</html>
