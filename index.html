<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Verify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080c14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,139,253,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 420px;
      max-width: calc(100vw - 32px);
      background: rgba(13,20,35,0.92);
      border: 1px solid rgba(99,179,237,0.15);
      border-radius: 24px;
      padding: 48px 40px 40px;
      text-align: center;
      backdrop-filter: blur(12px);
      z-index: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,179,237,0.5), transparent);
    }

    .icon-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(99,179,237,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      background: rgba(99,179,237,0.05);
      transition: border-color 0.4s ease, background 0.4s ease;
    }

    .icon-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(99,179,237,0.08);
    }

    .icon-ring svg {
      width: 36px;
      height: 36px;
      stroke: #63b3ed;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.4s ease;
    }

    .icon-ring.success { border-color: rgba(72,187,120,0.3); background: rgba(72,187,120,0.07); }
    .icon-ring.success svg { stroke: #48bb78; }
    .icon-ring.fail { border-color: rgba(252,129,129,0.3); background: rgba(252,129,129,0.07); }
    .icon-ring.fail svg { stroke: #fc8181; }

    .pulse-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(99,179,237,0.15);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { opacity: 0.8; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.45); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #e8f0fe;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      transition: all 0.3s ease;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(160,174,205,0.65);
      line-height: 1.65;
      margin-bottom: 32px;
      transition: all 0.3s ease;
    }

    .status-bar {
      background: rgba(99,179,237,0.05);
      border: 1px solid rgba(99,179,237,0.1);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: rgba(160,174,205,0.7);
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.35s ease;
    }

    .status-bar.checking {
      border-color: rgba(99,179,237,0.3);
      color: #63b3ed;
      background: rgba(99,179,237,0.08);
    }

    .status-bar.pass {
      border-color: rgba(72,187,120,0.35);
      color: #48bb78;
      background: rgba(72,187,120,0.07);
    }

    .status-bar.fail {
      border-color: rgba(252,129,129,0.35);
      color: #fc8181;
      background: rgba(252,129,129,0.07);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .verify-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2b6cb0 0%, #1a4a8a 100%);
      color: #e8f0fe;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .verify-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left 0.55s ease;
    }

    .verify-btn:hover::before { left: 160%; }
    .verify-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(43,108,176,0.35); }
    .verify-btn:active { transform: scale(0.98); }
    .verify-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .verify-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(232,240,254,0.2);
      border-top-color: #e8f0fe;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .fp-badge {
      margin-top: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 10px;
      font-family: monospace;
      color: rgba(160,174,205,0.28);
      word-break: break-all;
      text-align: left;
      display: none;
    }

    .meta {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(160,174,205,0.3);
      letter-spacing: 0.4px;
    }

    .meta svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="page">
    <div class="card">
      <div class="icon-ring" id="iconRing">
        <div class="pulse-ring" id="pulseRing"></div>
        <svg id="iconSvg" viewBox="0 0 24 24">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>

      <h1 id="mainTitle">Device Verification</h1>
      <p class="subtitle" id="mainSub">Confirm your device identity to continue.<br>This takes just a moment.</p>

      <div class="status-bar" id="statusBar">
        <span id="statusText">Waiting to verify</span>
      </div>

      <button class="verify-btn" id="verifyBtn" onclick="verify()">
        <svg id="btnIcon" viewBox="0 0 24 24">
          <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622C17.176 19.29 21 14.591 21 9c0-1.171-.151-2.307-.432-3.386z"/>
        </svg>
        <span id="btnText">Verify Now</span>
      </button>

      <div class="fp-badge" id="fpBadge"></div>

      <div class="meta">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Secured · One-time device check
      </div>
    </div>
  </div>

  <script>
    function fingerprint() {
      return btoa([
        navigator.userAgent,
        navigator.language,
        screen.width,
        screen.height,
        navigator.platform
      ].join("|"));
    }

    function setIcon(type) {
      const ring = document.getElementById('iconRing');
      const svg  = document.getElementById('iconSvg');
      ring.className = 'icon-ring ' + type;
      if (type === 'success') {
        svg.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
      } else if (type === 'fail') {
        svg.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
      }
    }

    async function verify() {
      const btn        = document.getElementById('verifyBtn');
      const statusBar  = document.getElementById('statusBar');
      const btnText    = document.getElementById('btnText');
      const btnIconEl  = document.getElementById('btnIcon');

      btn.disabled = true;
      btnIconEl.outerHTML = '<div class="spinner" id="btnIcon"></div>';
      btnText.textContent  = 'Verifying...';
      statusBar.className  = 'status-bar checking';
      statusBar.innerHTML  = '<div class="dot"></div><span>Scanning device fingerprint…</span>';

      const fp = fingerprint();
      await new Promise(r => setTimeout(r, 900));

      const fpBadge = document.getElementById('fpBadge');
      fpBadge.style.display = 'block';
      fpBadge.textContent   = 'FP: ' + fp.slice(0, 52) + '…';

      try {
        const res  = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fp })
        });
        const data = await res.json();

        if (data.status === 'pass') {
          statusBar.className = 'status-bar pass';
          statusBar.innerHTML = '<div class="dot"></div><span>' + data.message + '</span>';
          document.getElementById('mainTitle').textContent = 'Verified!';
          document.getElementById('mainSub').textContent   = 'Your device has been successfully verified.';
          setIcon('success');
        } else {
          statusBar.className = 'status-bar fail';
          statusBar.innerHTML = '<div class="dot"></div><span>' + data.message + '</span>';
          document.getElementById('mainTitle').textContent = 'Verification Failed';
          document.getElementById('mainSub').textContent   = 'This device could not be verified.';
          setIcon('fail');
          resetBtn('Try Again');
        }

        const params  = new URLSearchParams(location.search);
        const webhook = params.get("webhook");
        if (webhook) {
          await fetch(decodeURIComponent(webhook), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: data.status, message: data.message, fingerprint: fp })
          });
        }
      } catch (e) {
        statusBar.className = 'status-bar fail';
        statusBar.innerHTML = '<div class="dot"></div><span>Server error — please try again</span>';
        setIcon('fail');
        resetBtn('Try Again');
      }
    }

    function resetBtn(label) {
      const btn = document.getElementById('verifyBtn');
      btn.disabled = false;
      btn.innerHTML = `
        <svg id="btnIcon" viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.85"/>
        </svg>
        <span id="btnText">${label}</span>`;
    }
  </script>
</body>
</html>
